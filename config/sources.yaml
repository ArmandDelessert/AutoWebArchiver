sources:
  - name: rts.ch
    type: rss
    url: https://www.rts.ch/info/toute-info/?format=rss/news

  - name: lemonde.fr
    type: sitemap
    url: https://www.lemonde.fr/sitemap_news.xml
    url_pattern: ".*\\.html$"

  - name: letemps.ch
    type: rss
    url: https://www.letemps.ch/articles.rss

  - name: apreslabiere.fr
    type: sitemap
    url: https://www.apreslabiere.fr/sitemap.xml
    exhaustive: true

  - name: le-courrier.ch
    type: sitemap
    url: https://www.le-courrier.ch/wp-sitemap.xml
    exhaustive: true

  - name: frenchspin.fr
    type: sitemap
    url: https://frenchspin.fr/wp-sitemap.xml
    exhaustive: true

  - name: techcafe.fr
    type: sitemap
    url: https://techcafe.fr/sitemap_index.xml
    exhaustive: true

settings:
  if_not_archived_within: "1w"
  capture_outlinks: false
  capture_screenshot: false
  skip_first_archive: true
  js_behavior_timeout: 0
  max_captures_per_minute: 7
  max_concurrent_spn2_jobs: 10
  min_concurrent_slots_per_source: 1
  max_run_seconds: 6000
  max_capture_attempts: 3
  poll_interval_seconds: 15
  poll_timeout_seconds: 180
  state_max_age_days: 90
