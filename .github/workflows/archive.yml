name: Archive new articles

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: autowebarchiver
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    # NOT ubuntu-slim: single-CPU runners have a hard 15-minute job timeout that
    # timeout-minutes cannot raise, and our runs can legitimately approach that.
    runs-on: ubuntu-latest
    timeout-minutes: 125  # max_run_seconds (6000s = 100min) + 25% drain/overhead margin
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          ARCHIVE_ORG_ACCESS_KEY: ${{ secrets.ARCHIVE_ORG_ACCESS_KEY }}
          ARCHIVE_ORG_SECRET_KEY: ${{ secrets.ARCHIVE_ORG_SECRET_KEY }}
          PYTHONPATH: src
        run: python -m autowebarchiver.main

      - name: Commit updated state
        if: always()  # commit whatever state was saved, even if the crawler step failed or was canceled
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/feed_stats.json
          git diff --staged --quiet || git commit -m "chore: update archive state"
          git push
