name: Archive new articles

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: autowebarchiver
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    # NOT ubuntu-slim: single-CPU runners have a hard 15-minute job timeout that
    # timeout-minutes cannot raise, and our runs can legitimately approach that.
    runs-on: ubuntu-latest
    timeout-minutes: 125  # max_run_seconds (6000s = 100min) + 25% drain/overhead margin
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          ARCHIVE_ORG_ACCESS_KEY: ${{ secrets.ARCHIVE_ORG_ACCESS_KEY }}
          ARCHIVE_ORG_SECRET_KEY: ${{ secrets.ARCHIVE_ORG_SECRET_KEY }}
          PYTHONPATH: src
        run: python -m autowebarchiver.main

      - name: Commit updated state
        if: always()  # commit whatever state was saved, even if the crawler step failed or was canceled
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/feed_stats.json state/run_history.json
          if git diff --staged --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "chore: update archive state"

          # main can move between checkout and this push (e.g. a code commit
          # landing mid-run, as happened to run #85). Since this commit only
          # touches state/*.json -- files no code change ever touches -- a
          # rebase onto the new tip is expected to always be conflict-free and
          # fast-forwardable; retry a few times rather than discarding a full
          # run's worth of archiving progress on the first race.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/3), rebasing onto the latest main and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::error::Rebase onto origin/main failed unexpectedly -- aborting rather than risk pushing something wrong"
              git rebase --abort
              exit 1
            fi
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1
