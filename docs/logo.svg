<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- The archive (redraw of the Internet Archive pillars mark). -->
  <g fill="#2c2c2c">
    <polygon points="50,8 4,30 8,36 92,36 96,30"/>
    <path d="M12,38 H24 L22.5,80 H13.5 Z"/>
    <path d="M33.33,38 H45.33 L43.83,80 H34.83 Z"/>
    <path d="M54.67,38 H66.67 L65.17,80 H56.17 Z"/>
    <path d="M76,38 H88 L86.5,80 H77.5 Z"/>
    <rect x="6" y="80" width="88" height="7"/>
    <rect x="2" y="89" width="96" height="4" rx="1"/>
  </g>

  <!-- Pages carried in on a conveyor belt, stopping short of the archive
       with a clear gap (not hidden behind the columns, for legibility). -->
  <g fill="#2c2c2c">
    <rect x="106" y="52" width="84" height="14" rx="7"/>
    <!-- pages (rectangle with a folded top-right corner) -->
    <path d="M118 34h15l5 5v13h-20z"/>
    <path d="M152 34h15l5 5v13h-20z"/>
  </g>
  <!-- rollers: cut into the belt's own thickness (never poking below it) as
       small pale "windows" rather than a same-colour shape, so they read
       clearly without adding a new colour. -->
  <g fill="#fff">
    <circle cx="119" cy="59" r="4.5"/>
    <circle cx="138" cy="59" r="4.5"/>
    <circle cx="158" cy="59" r="4.5"/>
    <circle cx="177" cy="59" r="4.5"/>
  </g>
</svg>
