<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 145 100" width="145" height="100">
  <!-- Pages carried in on a conveyor belt that runs deep into the building:
       drawn before the archive so the rightmost column occludes its left end,
       including the leading page and the belt's first roller. -->
  <rect x="77.5" y="63" width="59.5" height="14" rx="7" fill="#2c2c2c"/>

  <!-- rollers: cut into the belt's own thickness (never poking below it) as
       small pale "windows" rather than a same-colour shape, so they read
       clearly without adding a new colour. One sits fully behind the column
       and is not shown; the other three stay visible on the belt. -->
  <g fill="#fff">
    <circle cx="82" cy="70" r="4.5"/>
    <circle cx="98" cy="70" r="4.5"/>
    <circle cx="114" cy="70" r="4.5"/>
    <circle cx="130" cy="70" r="4.5"/>
  </g>

  <!-- pages (rectangle with a folded top-right corner): white with a black
       outline so they read as paper. The leading page is half-swallowed by
       the rightmost column, showing it entering the archive. -->
  <g fill="#fff" stroke="#2c2c2c" stroke-width="3" stroke-linejoin="round">
    <path d="M78.5,45 h12 l8,8 v10 h-20 z"/>
    <path d="M108,45 h12 l8,8 v10 h-20 z"/>
  </g>

  <!-- the folded corner itself: a right triangle sharing the same hypotenuse
       as the bevel cut, drawn just inside it so the flap overlaps the page's
       own body like paper folding down over itself. Sized to match the bevel. -->
  <g fill="#2c2c2c">
    <path d="M90,45 L98,53 L90,53 Z"/>
    <path d="M120,45 L128,53 L120,53 Z"/>
  </g>

  <!-- The archive (redraw of the Internet Archive pillars mark), drawn last so
       its rightmost column hides the belt's incoming end and the leading page. -->
  <g fill="#2c2c2c">
    <polygon points="50,8 4,30 8,36 92,36 96,30"/>
    <path d="M12,38 H24 L22.5,80 H13.5 Z"/>
    <path d="M33.33,38 H45.33 L43.83,80 H34.83 Z"/>
    <path d="M54.67,38 H66.67 L65.17,80 H56.17 Z"/>
    <path d="M76,38 H88 L86.5,80 H77.5 Z"/>
    <rect x="6" y="80" width="88" height="7"/>
    <rect x="2" y="89" width="96" height="4" rx="1"/>
  </g>
</svg>
